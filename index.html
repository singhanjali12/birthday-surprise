<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    color: white;
}

/* Slides */
.slide {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.active {
    display: flex;
}

/* Button */
button {
    padding: 12px 20px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #ff4b5c;
    color: white;
    cursor: pointer;
    margin-top: 20px;
}

/* Image */
img {
    width: 250px;
    border-radius: 20px;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- 🎬 Slide 1 -->
<div class="slide active" id="slide1">
    <h1>Hey handsome 😘</h1>
    <p>I heard it's your birthday... 🎂</p>
    <p>Happy Birthday sexy 💖</p>
    <h2>Is it your birthday? 😏</h2>

    <button onclick="goNext()">Yes ❤️</button>
</div>

<!-- 🎬 Slide 2 -->
<div class="slide" id="slide2">
    <h1>🎉 Happy Birthday Baby ❤️</h1>

    <!-- Replace with his photo -->
    <img src="photo1.jpg" alt="birthday">

    <p>You are my favorite person in the whole world 💕</p>

    <!-- Music -->
    <audio id="music" loop>
        <source src="your-music.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
function goNext() {
    document.getElementById("slide1").classList.remove("active");
    document.getElementById("slide2").classList.add("active");

    // Play music after click (browser allows this)
    document.getElementById("music").play();
}
</script>

</body>
</html>
