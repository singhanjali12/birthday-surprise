<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    color: white;
    overflow: hidden;
}

/* Slides */
.slide {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.active {
    display: flex;
}

/* Button */
button {
    padding: 12px 22px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: #ff4b5c;
    color: white;
    cursor: pointer;
    margin-top: 20px;
}

/* Image animation */
img {
    width: 260px;
    border-radius: 20px;
    margin-top: 20px;
    transform: scale(0);
    animation: pop 1s ease forwards;
}

/* Pop animation */
@keyframes pop {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<!-- 🎬 Slide 1 -->
<div class="slide active" id="slide1">
    <h1>Hey handsome 😘</h1>
    <p>I heard it's your birthday 🎂</p>
    <p>If yes, click below 👇</p>

    <button onclick="goNext()">Yes ❤️</button>
</div>

<!-- 🎬 Slide 2 -->
<div class="slide" id="slide2">
    <h1>🎉 Happy Birthday Baby ❤️</h1>

    <!-- Your name -->
    <h2>- Love, Anjali 💖</h2>

    <!-- Replace with his photo -->
    <img src="photo1.jpg" alt="birthday">

    <!-- Music -->
    <audio id="music" loop>
        <source src="your-music.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
function goNext() {
    document.getElementById("slide1").classList.remove("active");
    document.getElementById("slide2").classList.add("active");

    document.getElementById("music").play();
}
</script>

</body>
</html>
